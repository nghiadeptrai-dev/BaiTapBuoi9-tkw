<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập JS</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 40px;
        }
        .box {
            background: white;
            padding: 20px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }
        .result {
            margin-top: 20px;
            background: #eee;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Nhập thông tin sinh viên</h2>

    <input type="text" id="fullName" placeholder="Nhập họ tên không dấu">
    <input type="text" id="studentId" placeholder="Nhập mã sinh viên">

    <button onclick="xuLy()">Xử lý</button>

    <div class="result" id="output"></div>
</div>

<script>
function xuLy() {
    let fullName = document.getElementById("fullName").value.trim();
    let studentId = document.getElementById("studentId").value.trim();

    if (!fullName || !studentId) {
        alert("Vui lòng nhập đầy đủ!");
        return;
    }

    let parts = fullName.split(" ");
    let firstName = parts[parts.length - 1].toLowerCase();
    let lastName = parts[0][0].toLowerCase();

    let middleName = "";
    for (let i = 1; i < parts.length - 1; i++) {
        middleName += parts[i][0].toLowerCase();
    }

    let email = firstName + lastName + middleName + "." + studentId.toLowerCase() + "@hvnh.edu.vn";

  
    let coursePeriod = "";
    let faculty = "";
    let program = "";

    if (studentId.includes("-")) {
        let prefix = studentId.split("-")[0]; 

        let code = prefix.replace(/[0-9]/g, ""); 
        let numberPart = prefix.match(/\d+/);
        coursePeriod = numberPart ? numberPart[0] : "";

        switch (code) {
            case "CO":
                program = "Chương trình Coventry";
                break;
            case "CA":
                program = "Chương trình City U";
                break;
            case "F":
                program = "Chương trình Sunderland";
                break;
            case "J":
                program = "Chương trình Japan";
                break;
            default:
                program = "Không xác định";
        }

        faculty = "Chương trình liên kết quốc tế";

    } else {

        coursePeriod = studentId.substring(0, 2);

        let facultyCode = studentId.substring(3, 6);

        let facultyMap = {
            "404": "Công nghệ thông tin và Kinh tế số",
            "408": "Khoa học dữ liệu",
            "401": "Ngân hàng",
            "403": "Quản trị kinh doanh",
            "405": "Kinh doanh quốc tế",
            "407": "Kinh tế",
            "406": "Luật",
            "751": "Ngoại ngữ",
            "402": "Kế toán - Kiểm toán"
        };

        faculty = facultyMap[facultyCode] || "Không xác định";
        program = "Chương trình chuẩn HVNH";
    }

    let last4 = studentId.slice(-4);
    let sum = 0;
    for (let i = 0; i < last4.length; i++) {
        if (!isNaN(last4[i])) {
            sum += parseInt(last4[i]);
        }
    }

    document.getElementById("output").innerHTML = `
        <b>Email:</b> ${email} <br><br>
        Xin chào <b>${fullName}</b>, bạn là sinh viên khóa <b>${coursePeriod}</b>, 
        khoa <b>${faculty}</b>, thuộc <b>${program}</b>, 
        tổng 4 số cuối là <b>${sum}</b>
    `;
}
</script>

</body>
</html>
