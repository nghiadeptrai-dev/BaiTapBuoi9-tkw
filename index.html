<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập JS</title>
</head>
<body>

<h2>Kết quả:</h2>
<p id="output"></p>

<script>
    let fullName = "Nguyen Ha Tuan Nghia";
    let studentId = "27A4042969";

   
    let parts = fullName.split(" ");
    let firstName = parts[parts.length - 1].toLowerCase();
    let lastName = parts[0][0].toLowerCase();
    let middleName = "";
    for (let i = 1; i < parts.length - 1; i++) {
    middleName += parts[i][0].toLowerCase();
}
   
    let email = firstName + lastName + middleName + "." + studentId.toLowerCase() + "@hvnh.edu.vn";

    let coursePeriod = studentId.substring(0, 2);


    let faculty = "Công nghệ thông tin và Kinh tế số";

    let last4 = studentId.slice(-4);
    let sum = 0;
    for (let i = 0; i < last4.length; i++) {
        sum += parseInt(last4[i]);
    }


    document.getElementById("output").innerHTML = `
        Email: ${email} <br><br>
        Xin chào ${fullName}, bạn là sinh viên khóa ${coursePeriod}, 
        khoa ${faculty}, tổng 4 số cuối trong mã sinh viên là ${sum}
    `;
</script>

</body>
</html>
